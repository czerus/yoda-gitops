apiVersion: apps/v1
kind: Deployment
metadata:
  name: seer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seer
  template:
    metadata:
      labels:
        app: seerr
    spec:
      volumes:
        - name: config
          hostPath:
            path: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/seerr     
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /config
              name: config
          ports:
              - containerPort: 5055
