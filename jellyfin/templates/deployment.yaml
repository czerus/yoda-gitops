apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "jellyfin.fullname" . }}
  labels:
    app: {{ template "jellyfin.name" . }}
    chart: {{ template "jellyfin.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: {{ template "jellyfin.name" . }}
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ template "jellyfin.name" . }}
        release: {{ .Release.Name }}
    spec:
      volumes:
        - name: movies
          #hostPath: /srv/mergerfs/mergefs/Movies/
          hostPath: /srv/mergerfs/mergefs/test/
        - name: tvshows
          hostPath: /srv/mergerfs/mergefs/test/
          #hostPath: /srv/mergerfs/mergefs/TVShows/
        - name: config
          hostPath: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/jellyfin         
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /data/movies
              name: movies
            - mountPath: /data/tvshows
              name: tvshows
          ports:
              containerPort: {{ .Values.containerPort }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
    {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
    {{- end }}