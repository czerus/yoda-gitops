apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
spec:
  revisionHistoryLimit: 0 
  replicas: 1
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      volumes:
        - name: music
          hostPath: 
            path: /srv/mergerfs/mergefs/data/media/music
        - name: config
          hostPath:
            path: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/navidrome         
      containers:
        - name: navidrome
          image: deluan/navidrome:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Europe/Warsaw"
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /music
              name: music
          ports:
              - containerPort: 4533
