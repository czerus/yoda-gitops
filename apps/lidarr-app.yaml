apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lidarr
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/czerus/yoda-gitops
    targetRevision: HEAD
    path: lidarr

  destination:
    server: https://kubernetes.default.svc
    namespace: lidarr

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true