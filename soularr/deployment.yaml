apiVersion: apps/v1
kind: Deployment
metadata:
  name: soularr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soularr
  template:
    metadata:
      labels:
        app: soularr
    spec:
      volumes:
        - name: downloads
          hostPath: 
            path: /srv/mergerfs/mergefs/Music/
        - name: config
          hostPath:
            path: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/soularr         
      containers:
        - name: soularr
          image: mrusse08/soularr:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /data
              name: config
            - mountPath: /downloads
              name: downloads
              
