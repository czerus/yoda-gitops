apiVersion: apps/v1
kind: Deployment
metadata:
  name: slskd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slskd
  template:
    metadata:
      labels:
        app: slskd
    spec:
      volumes:
        - name: data
          hostPath: 
            path: /srv/mergerfs/mergefs/Music/
        - name: config
          hostPath:
            path: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/slskd         
      containers:
        - name: slskd
          image: slskd/slskd
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /app
              name: config
            - mountPath: /data
              name: data
          ports:
              - containerPort: 5030
              - containerPort: 5031
              - containerPort: 50300
