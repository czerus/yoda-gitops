apiVersion: v1
kind: Service
metadata:
  name: slskd
spec:
  type: LoadBalancer
  selector:
    app: slskd
  ports:
  - protocol: TCP
    port: 5030
    targetPort: 5030
    name: tcp-5030
  - protocol: TCP
    port: 5031
    targetPort: 5031
    name: tcp-5031
  - protocol: TCP
    port: 50300
    targetPort: 50300
    name: tcp-50300