apiVersion: apps/v1
kind: Deployment
metadata:
  name: slskd
spec:
  revisionHistoryLimit: 0
  replicas: 1
  selector:
    matchLabels:
      app: slskd
  template:
    metadata:
      labels:
        app: slskd
    spec: 
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: data
          hostPath: 
            path: /srv/mergerfs/mergefs/data
        - name: config
          hostPath:
            path: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/slskd         
      containers:
        - name: slskd
          image: slskd/slskd
          imagePullPolicy: IfNotPresent
          env:
            - name: SLSKD_DOWNLOADS_DIR
              value: /data/media/music
            - name: SLSKD_INCOMPLETE_DIR
              value: /data/slskd
            - name: SLSKD_SLSK_USERNAME
              valueFrom:
                secretKeyRef:
                  name: slskd-credentials
                  key: username
            - name: SLSKD_SLSK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: slskd-credentials
                  key: password
          volumeMounts:
            - mountPath: /app
              name: config
            - mountPath: /data
              name: data
          ports:
              - containerPort: 5030
                name: main
              - containerPort: 5031
                name: second
              - containerPort: 50300
                name: third
