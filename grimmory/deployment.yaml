apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
spec:
  revisionHistoryLimit: 0 
  replicas: 1
  selector:
    matchLabels:
      app: grimmory
  template:
    metadata:
      labels:
        app: grimmory
    spec:
      volumes:
        - name: config
          hostPath:
            path: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/grimmory       
      containers:
        - name: grimmory
          image: grimmory/grimmory:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Europe/Warsaw"
            - name: DATABASE_URL
              value: jdbc:mariadb://192.168.50.39:3306/grimmory
            - name: MYSQL_DATABASE
              value: grimmory
            - name: MYSQL_USER
              value: grimmory
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-credentials
                  key: grimmory_pass
          volumeMounts:
            - mountPath: /config
              name: config
          ports:
              - containerPort: 6060
