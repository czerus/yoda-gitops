apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
spec:
  revisionHistoryLimit: 0 
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      volumes:
        - name: config
          hostPath:
            path: /srv/dev-disk-by-uuid-f0d9ee2e-5550-4e41-897d-9b8d2d01c681/pod_config/mariadb       
      containers:
        - name: mariadb
          image: lscr.io/linuxserver/mariadb:11.4.5
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Europe/Warsaw"
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-credentials
                  key: mariadb_pass
            - name: MYSQL_DATABASE
              value: grimmory
            - name: MYSQL_USER
              value: grimmory
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-credentials
                  key: grimmory_pass
          volumeMounts:
            - mountPath: /config
              name: config
          ports:
              - containerPort: 3306
